# Renders the golem-hartland Shem overlay + prompt bundle into the `golem-hartland-shem` ConfigMap
# for GitOps deploy — the olymp `hartland-golems` ApplicationSet applies this as one source and the
# golem chart mounts the result at GOLEM_SHEM_DIR (`shem.configMapName: golem-hartland-shem`).
#
# Stage 3.3 T6 — the en+cs prompt bundle is now packed alongside shem.yaml. ConfigMap keys can't
# contain '/', so each prompt file gets a flat key (`prompts-<locale>-intent.yaml`); the golem chart
# re-nests them into `prompts/<locale>/intent.yaml` at mount time via `shem.items` (olymp
# _values.yaml → chart _volumes.tpl). golem's PromptStore then loads `prompts/<locale>/intent.yaml`
# (PROMPT_NAMES=intent), so the mounted Hartland prompt replaces the generic classpath fallback.
# Only `intent` is live (PlanComposer); free-sql/chip-topup have no live kotlin consumer.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: golem-hartland-shem
    files:
      - shem.yaml
      - prompts-en-intent.yaml=prompts/en/intent.yaml
      - prompts-cs-intent.yaml=prompts/cs/intent.yaml
generatorOptions:
  # Stable name — the golem chart references `golem-hartland-shem` by a fixed `shem.configMapName`.
  disableNameSuffixHash: true
